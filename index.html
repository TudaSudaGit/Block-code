<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
    body {
      background: gray; 
      margin: 0;
      overflow: hidden;
    }
    .block {
      position: absolute;
      left:10px;
      top: 10px;
      cursor: grab;   
      user-select: none;
      user-select: none;  
      display: flex;
      align-items: center;     
      justify-content: center; 
      margin: 0px;
      border: 5px solid #a61c00;
      text-align: center;
      background-color: #cc0000;
      box-sizing: border-box;
      width: 120px;
      height: 60px;
      border-radius: 10px;
      transition: opacity 0.2s, border-color 0.3s, box-shadow 0.3s, filter 0.3s;
      z-index: 100;
    }
    .block:hover {
      filter: brightness(1.2);
      border-color: rgba(255, 255, 255, 0.6);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
      animation: vibrate 0.4s linear 1;
    }
    #spawner {
      left: 10px;
      top: 10px;
      z-index: 10; 
    }
    @keyframes vibrate {
      0% { transform: translate(0); }
      25% { transform: translate(2px, -2px); }
      50% { transform: translate(-2px, 2px); }
      75% { transform: translate(1px, 1px); }
      100% { transform: translate(0); }
    }
    .block:active {
      cursor: grabbing;
    }
    .trash {
      user-select: none;
      position: absolute;
      border-radius: 10px;
      bottom: 10px;
      right: 10px;
      width: 126px;   
      height: 63px;  
      border: 3px solid black;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .trash.active {
      background: red;
      box-shadow: 0 0 20px red;
}
  </style>
</head>
<body>
  <div class="trash" id="trash">🗑️</div>
 <div class="block" id="spawner">Drag me</div>
    <script>
    const spawner = document.getElementById('spawner');
    const trash = document.getElementById('trash');
    const trashRect = trash.getBoundingClientRect();
    let activeBlock = null; 
    let offsetX = 0;
    let offsetY = 0;
      function startDrag(e, element) {
      activeBlock = element; 
      activeBlock.style.opacity = '0.5'; 
      const rect = activeBlock.getBoundingClientRect();
      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;
    }
    spawner.onmousedown = (e) => {
      const newBlock = document.createElement('div');
      newBlock.classList.add('block');
      newBlock.innerText = "I am new!";
      newBlock.style.left = spawner.offsetLeft + 'px';
      newBlock.style.top = spawner.offsetTop + 'px';
      document.body.appendChild(newBlock);
      newBlock.onmousedown = (ev) => {
        startDrag(ev, newBlock);
      };
      startDrag(e, newBlock);
    };
    document.onmousemove = (e) => {
      if (!activeBlock) return; 
      const x = e.clientX - offsetX;
      const y = e.clientY - offsetY;
      activeBlock.style.left = x + 'px';
      activeBlock.style.top = y + 'px';
      const blockRect = activeBlock.getBoundingClientRect();
      const isOverTrash = (blockRect.right > trashRect.left && blockRect.left < trashRect.right && blockRect.bottom > trashRect.top && blockRect.top < trashRect.bottom);
      if (isOverTrash) {
        trash.classList.add('active');
      } else {
        trash.classList.remove('active');
      }
    };
    document.onmouseup = () => {
      if (!activeBlock) return;
      const blockRect = activeBlock.getBoundingClientRect();
      const isOverTrash = (blockRect.right > trashRect.left && blockRect.left < trashRect.right && blockRect.bottom > trashRect.top && blockRect.top < trashRect.bottom);
      if (isOverTrash) {
        activeBlock.remove();
      } else {
        activeBlock.style.opacity = '1'; 
      }
      trash.classList.remove('active');
      activeBlock = null;
    };
  </script>
</body>
</html>
