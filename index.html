<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Codeblock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="panel left-panel">
    <div class="block output" id="spawnerOutput">output</div>
    <div class="block variable" id="spawnerVar">variable</div>
    <div class="block declare" id="spawnerDeclare">int …</div>
    <div class="block assign" id="spawnerAssign">x = …</div>
    <div class="block ifblock" id="spawnerIf">if</div>
    <div class="block end-if" id="spawnerEndIf">end if</div>
    <div class="block while" id="spawnerWhile">while</div>
    <div class="block end-while" id="spawnerEndWhile">end cycle</div>
    <div class="block forblock" id="spawnerFor">for</div>
    <div class="block array" id="spawnerArray">array</div>
</div>
  
<div class="panel right-panel">
    <button class="run-block" id="runButton">RUN</button>
    <button class="debug-block" id="debugButton">DEBUG</button>
    <button class="step-block" id="stepButton" disabled>STEP →</button>
    <div class="trash" id="trash">🗑️</div>
</div>

<div class="block start-block" id="startBlock">START</div>

<div class="console-container" id="consoleContainer">
    <div class="console-header">
        <span>Консоль</span>
        <button class="console-clear" id="clearConsole">✕</button>
    </div>
    <div class="console-content" id="consoleContent"></div>
</div>

<script src="main.js"></script>
</body>
</html>
